[build]
# Railpack auto-detects Python from requirements.txt at root
# Use buildCommand to build both frontend and prepare backend
buildCommand = "cd frontend && npm install && npm run build && cp -r dist ../backend/static && cd .. && pip install -r requirements.txt"

[deploy]
# Start the backend
startCommand = "python -m uvicorn app:app --host 0.0.0.0 --port 8000"